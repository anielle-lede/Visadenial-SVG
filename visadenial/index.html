<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visa Denial Rate</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="custom.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <h1>How high is  Visa-Denialrate worldwide?</h1>
    <div id="my-svg-chart"></div>

    <script type="module">
      import * as topojson from "https://cdn.jsdelivr.net/npm/topojson-client@3/+esm";
      const [rateData, world] = await Promise.all([
  d3.csv('2025-us-b-visa-denial-rate.csv'),
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
]);

const countries = topojson.feature(world, world.objects.countries).features;

console.log(rateData);   // check: Array von Objekten, je eins pro Land
console.log(countries);  // check: Array von GeoJSON-Features

const rateByCountry = new Map(
  rateData.map(d => [
    d.NATIONALITY.trim().toUpperCase(),
    parseFloat(d['FY25 ADJUSTED REFUSAL RATE'])
  ])
);

const colorScale = d3.scaleSequential()
  .domain([0, 100])
  .interpolator(d3.interpolateRgb('#cde2fb', '#0d366b'));

  const width = 960, height = 500;

const projection = d3.geoNaturalEarth1().fitSize([width, height], {type: "Sphere"});
const path = d3.geoPath(projection);

const myChart = d3.select('#my-svg-chart')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

const countryShapes = myChart
  .selectAll('path.country')
  .data(countries)
  .join('path')
  .attr('class', 'country')
  .attr('d', path);
  
const nameAliases = {
  'DEM. REP. CONGO': 'CONGO, DEMOCRATIC REPUBLIC OF THE',
  'CONGO': 'CONGO, REPUBLIC OF THE',
  'DOMINICAN REP.': 'DOMINICAN REPUBLIC',
  'BAHAMAS': 'BAHAMAS, THE',
  "CÔTE D'IVOIRE": 'COTE D`IVOIRE',
  'GUINEA-BISSAU': 'GUINEA - BISSAU',
  'CENTRAL AFRICAN REP.': 'CENTRAL AFRICAN REPUBLIC',
  'EQ. GUINEA': 'EQUATORIAL GUINEA',
  'GAMBIA': 'GAMBIA, THE',
  'MYANMAR': 'BURMA',
  'NORTH KOREA': 'KOREA, NORTH',
  'SOUTH KOREA': 'KOREA, SOUTH',
  'UNITED KINGDOM': 'GREAT BRITAIN AND NORTHERN IRELAND',
  'CZECHIA': 'CZECH REPUBLIC',
  'BOSNIA AND HERZ.': 'BOSNIA-HERZEGOVINA',
  'MACEDONIA': 'NORTH MACEDONIA',
  'S. SUDAN': 'SOUTH SUDAN',
  'SOLOMON IS.': 'SOLOMON ISLANDS',
  'PALESTINE': 'PALESTINIAN AUTHORITY TRAVEL DOCUMENT'
};

countryShapes.style('fill', d => {
  const rawName = d.properties.name.toUpperCase();
  const lookupName = nameAliases[rawName] ?? rawName;
  const rate = rateByCountry.get(lookupName);
  return rate !== undefined ? colorScale(rate) : '#eee';
});

console.log(rateByCountry);

const legendWidth = 300, legendHeight = 50;

const legendSvg = d3.select('#my-svg-chart')
  .append('svg')
  .attr('width', legendWidth + 40)
  .attr('height', legendHeight);

// Gradient-Definition: sampelt die Farbskala an mehreren Punkten
const gradient = legendSvg.append('defs')
  .append('linearGradient')
  .attr('id', 'legend-gradient');

gradient.selectAll('stop')
  .data(d3.range(0, 1.01, 0.1))
  .join('stop')
  .attr('offset', d => `${d * 100}%`)
  .attr('stop-color', d => colorScale(d * 100));

// die eingefärbte Leiste
legendSvg.append('rect')
  .attr('x', 20)
  .attr('y', 10)
  .attr('width', legendWidth)
  .attr('height', 12)
  .style('fill', 'url(#legend-gradient)');

// Achse darunter mit Prozent-Beschriftung
const legendScale = d3.scaleLinear()
  .domain([0, 100])
  .range([20, 20 + legendWidth]);

const legendAxis = d3.axisBottom(legendScale)
  .ticks(5)
  .tickFormat(d => d + '%');

legendSvg.append('g')
  .attr('transform', `translate(0, 22)`)
  .call(legendAxis);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  </body>
</html>
